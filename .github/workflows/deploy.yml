name: Deploy Hugo site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.123.7
    steps:
      - name: Install Hugo CLI (extended)
        run: |
          wget -qO "${RUNNER_TEMP}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      # Authorize private submodule clones via fine-grained PAT.
      # SUBMODULE_PAT scope: read-only Contents on the specific private
      # repo(s) referenced from .gitmodules. No-op if the secret is empty.
      # See docs/PRIVATE_CONTENT.md for the setup recipe.
      - name: Configure git for private submodules
        if: ${{ env.HAS_PAT == 'true' }}
        env:
          HAS_PAT: ${{ secrets.SUBMODULE_PAT != '' }}
          PAT: ${{ secrets.SUBMODULE_PAT }}
        run: |
          git config --global url."https://x-access-token:${PAT}@github.com/".insteadOf "git@github.com:"
          git config --global url."https://x-access-token:${PAT}@github.com/".insteadOf "https://github.com/"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
