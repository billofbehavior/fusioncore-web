name: Deploy Hugo site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.123.7
    steps:
      - name: Install Hugo CLI (extended)
        run: |
          wget -qO "${RUNNER_TEMP}/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      # Parent repo only — actions/checkout would override our git config
      # if we asked it to do submodules here. We do submodules below with
      # our PAT-based URL rewrite still in effect.
      - name: Checkout parent
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      # Authorize private submodule clones via fine-grained PAT.
      # Sets each submodule's effective URL in .git/config (preserves
      # gitlink semantics) with the PAT baked in. Reads .gitmodules
      # generically — works for any number of submodules. No-op if the
      # secret is empty. See docs/PRIVATE_CONTENT.md for the setup recipe.
      - name: Init submodules with PAT auth
        if: ${{ env.HAS_PAT == 'true' }}
        env:
          HAS_PAT: ${{ secrets.SUBMODULE_PAT != '' }}
          PAT: ${{ secrets.SUBMODULE_PAT }}
        run: |
          git submodule init
          git config -f .gitmodules --get-regexp 'submodule\..*\.url' | while read -r key url; do
            name=$(printf '%s' "$key" | sed -E 's/^submodule\.(.+)\.url$/\1/')
            newurl=$(printf '%s' "$url" | sed -E "s|^git@github\\.com:|https://x-access-token:${PAT}@github.com/|")
            git config "submodule.${name}.url" "$newurl"
          done
          git submodule update --init --recursive

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo --gc --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
