{{ define "main" }}

<section class="hero hero--compact">
  <div class="hero__inner">
    <p class="hero__kicker"><a href="{{ "/blog/" | relURL }}">← Blog</a></p>
    <h1 class="hero__title hero__title--md">{{ .Title }}</h1>
    <p class="hero__lede">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
    </p>
  </div>
</section>

<section class="band">
  <div class="band__inner band__inner--reading">
    {{ .Content }}
    <p style="margin-top:2rem;"><a href="{{ "/blog/" | relURL }}">← All posts</a></p>
  </div>
</section>

{{ end }}
