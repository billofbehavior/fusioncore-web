<header class="topnav">
  <div class="topnav__inner">
    <a class="topnav__brand" href="{{ "/" | relURL }}">
      {{ $mark := .Params.brand_mark | default "fusioncore" }}
      <img class="topnav__logomark"
           src="{{ (printf "brand/%s/icon-192.png" $mark) | relURL }}"
           alt="{{ .Params.brand_full | default "FusionCore" }}">
      <span class="topnav__brand-text">{{ .Params.brand_full | default "FusionCore" }}</span>
    </a>
    <nav class="topnav__menu" aria-label="Primary">
      <a href="{{ "/" | relURL }}">FusionCore</a>
      <a href="{{ "/bob/" | relURL }}">Bill of Behavior</a>
      <a href="{{ "/stormcenter/" | relURL }}">Storm Center</a>
      <a href="{{ "/blog/" | relURL }}">Blog</a>
      <a href="{{ "/reel/" | relURL }}">Reel</a>
      <a href="#contact">Contact</a>
    </nav>
  </div>
</header>
